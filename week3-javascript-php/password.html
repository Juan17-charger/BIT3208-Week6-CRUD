<!DOCTYPE html>
<html>
<body>

<h2>Password Checker</h2>

<input
type="password"
id="password"
onkeyup="checkPassword()">

<p id="message"></p>

<script>
function checkPassword(){
    let password =
    document.getElementById("password").value;

    let message =
    document.getElementById("message");

    if(password.length < 6){
        message.innerHTML =
        "Weak Password";
    } else {
        message.innerHTML =
        "Strong Password";
    }
}
</script>

</body>
</html>
